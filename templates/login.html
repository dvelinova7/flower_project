{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card shadow p-4" style="width: 100%; max-width: 420px; border-radius:16px;">

    <h3 class="text-center mb-4">Вход</h3>

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Имейл</label>
        <input type="email" name="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Парола</label>
        <input type="password" name="password" class="form-control" required>
      </div>
        <div class="text-center mt-3">
            Нямаш акаунт?
            <a href="/register" class="fw-semibold">Регистрирай се тук</a>
        </div>
      <button class="btn btn-dark w-100 mt-2">Вход</button>
    </form>

  </div>
  
</div>
{% endblock %}
