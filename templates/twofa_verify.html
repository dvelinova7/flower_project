{% extends "base.html" %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
  <div class="card shadow-lg p-4 text-center"
       style="width: 100%; max-width: 420px; border-radius: 18px; background: rgba(255,255,255,0.95);">

    <h3 class="mb-3">2FA потвърждение</h3>

    <p class="text-muted mb-4">
      Отвори Authenticator приложението и въведи 6-цифрения код.
    </p>

    <form method="post">
      <div class="mb-4">
        <input class="form-control text-center"
               name="code"
               inputmode="numeric"
               autocomplete="one-time-code"
               maxlength="6"
               placeholder="123456"
               style="font-size: 20px; letter-spacing: 4px;"
               required>
      </div>

      <button class="btn btn-dark w-100">
        Потвърди
      </button>
    </form>

  </div>
</div>

{% endblock %}
