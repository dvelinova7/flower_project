{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card shadow p-4" style="width: 100%; max-width: 420px; border-radius:16px;">

  <h3>2FA потвърждение</h3>
  <p class="text-muted">Отвори Authenticator приложението и въведи 6-цифрения код.</p>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Код</label>
      <input class="form-control" name="code" inputmode="numeric" autocomplete="one-time-code" required>
    </div>
    <button class="btn btn-dark w-100">Потвърди</button>
  </form>
  </div>
</div>
{% endblock %}
