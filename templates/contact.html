{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center">
  <div class="w-100" style="max-width: 900px;">

    <!-- Контакти на магазина -->
    <div class="card shadow-sm p-4 mb-4 text-center"
         style="border-radius:18px; background: rgba(255,255,255,0.92);">

      <h3 class="mb-3">Свържи се с нас</h3>

      <div class="row text-center">

        <div class="col-md-4 mb-3">
          <div class="fw-bold">📧 Имейл</div>
          <div>info@didiflowershop.com</div>
        </div>

        <div class="col-md-4 mb-3">
          <div class="fw-bold">📞 Телефон</div>
          <div>+359 88 123 4567</div>
        </div>

        <div class="col-md-4 mb-3">
          <div class="fw-bold">📍 Адрес</div>
          <div>гр. София, бул. Цветен 12</div>
        </div>

      </div>
    </div>

    <!-- Контакт форма -->
    <div class="card shadow p-4"
         style="border-radius:18px; background: rgba(255,255,255,0.95);">

      <h4 class="mb-3 text-center">Изпрати запитване</h4>

      <form method="post">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Име</label>
            <input type="text" name="name" class="form-control" required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Имейл</label>
            <input type="email" name="email" class="form-control" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Съобщение</label>
          <textarea class="form-control" name="message" rows="4" required></textarea>
        </div>

        <div class="text-center">
          <button class="btn btn-dark px-4">Изпрати</button>
        </div>
      </form>

    </div>

  </div>
</div>

{% endblock %}
